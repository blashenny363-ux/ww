<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>связь со мной</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #0c1a2b 0%, #030507 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(13, 27, 62, 0.6);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.15);
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        p {
            margin-bottom: 30px;
            line-height: 1.6;
            color: #aabbd6;
        }

        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }

        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Привет!</h1>
        <p>
            Привет, меня зовут Ярослав, мне 14 лет, и хочу накопить на новый ноутбук. я занимаюсь вёрсткой сайтов для вашей деятельности или бизнеса. Пишите мне на почту, договоримся и обсудим цену и ваще пожелание.<br>
        </p>
        <a href="mailto:traffkid35@gmail.com" class="btn">Связь со мной</a>
    </div>

</body>
</html>
